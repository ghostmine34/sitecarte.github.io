<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Cartes Pro - Outil</title>
    <!-- Chargement de la bibliothèque de capture d'écran HTML -> PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121214;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 50px;
            padding: 20px;
            margin: 0;
            user-select: none; /* Évite de sélectionner du texte en dragant l'image */
        }

        /* --- PANNEAU DE CONTRÔLE --- */
        .controls {
            background: #1a1a1e;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 320px;
            border: 1px solid #2d2d35;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label { font-size: 0.85rem; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3a3a44;
            background: #26262b;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        input[type="range"] { padding: 0; }
        input:focus, select:focus { border-color: #4a90e2; }

        /* --- BOUTON TÉLÉCHARGER --- */
        .btn-download {
            margin-top: 10px;
            padding: 12px;
            background: #00bfff;
            color: #121214;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(0, 191, 255, 0.3);
        }
        .btn-download:hover { background: #0099cc; }
        .btn-download:active { transform: scale(0.98); }

        /* --- STRUCTURE DE LA CARTE --- */
        .card-container {
            perspective: 1000px;
        }
        
        .card {
            width: 360px;
            height: 510px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 14px;
            box-sizing: border-box;
            transition: border 0.3s, background 0.3s;
            border: 6px solid #ffd700;
        }

        /* --- BANNIÈRE DE NOM (RARETÉ À GAUCHE, EFFET À DROITE) --- */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 3px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap;
        }

        .card-name {
            font-size: 1.15rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
            text-align: left;
            padding-left: 4px;
        }

        #card-shine-badge {
            background: #444;
            display: none; /* Caché par défaut si "None" */
        }

        /* --- ZONE DE L'IMAGE (PLUS GRANDE ET DRAGGABLE) --- */
        .art-window {
            width: 100%;
            height: 380px;
            margin-top: 10px;
            border: 3px solid rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            background: #151518;
            cursor: grab;
        }
        .art-window:active { cursor: grabbing; }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center;
            pointer-events: none; /* Évite que le navigateur bloque le drag de l'image nativement */
        }

        /* --- STYLES PAR RARETÉ --- */
        .card.common { background: linear-gradient(135deg, #5a6268, #343a40); border-color: #6c757d; }
        .card.common #card-rarity-badge { background: #6c757d; }

        .card.rare { background: linear-gradient(135deg, #1e3c72, #2a5298); border-color: #007bff; }
        .card.rare #card-rarity-badge { background: #007bff; }

        .card.epic { background: linear-gradient(135deg, #4b0082, #800080, #240046); border-color: #bd93f9; }
        .card.epic #card-rarity-badge { background: #9b5de5; }

        .card.legendary { background: linear-gradient(135deg, #ff6b6b, #ff8e53, #e65c00); border-color: #ff9f43; }
        .card.legendary #card-rarity-badge { background: #ff9f43; color: #000; font-weight: bold; }

        .card.mythic { background: linear-gradient(135deg, #ffe259, #ffa751); border-color: #ffda79; }
        .card.mythic #card-rarity-badge { background: #ffcc00; color: #000; }

        .card.og { background: radial-gradient(circle at center, #ff0000 0%, #7a0000 60%, #2b0000 100%); border-color: #ff3333; }
        .card.og #card-rarity-badge { background: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.6); }

        .card.relic { background: linear-gradient(45deg, #ff007f, #7f00ff, #00bfff, #00ff7f, #ff007f); background-size: 200% 200%; animation: gradientBG 8s ease infinite; border-color: #f1f2f6; }
        .card.relic #card-rarity-badge { background: linear-gradient(to right, #ff007f, #00bfff); }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- STYLES DES EFFETS SHINE REVISITÉS --- */
        .shine-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .card.holo .shine-overlay {
            opacity: 0.4;
            background: linear-gradient(115deg, transparent 25%, rgba(255,255,255,0.7) 50%, transparent 75%);
        }
        .card.foil .shine-overlay {
            opacity: 0.25;
            background: linear-gradient(to right, red, orange, yellow, green, blue, violet);
        }

        /* --- EFFET ULTRA GOLD JAUNE FLASHY --- */
        .card.gold .art-image {
            filter: sepia(1) saturate(10) hue-rotate(10deg) brightness(0.95);
        }
        .card.gold .art-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 220, 0, 0.65); 
            mix-blend-mode: hard-light;
            pointer-events: none;
            z-index: 2;
        }
        .card.gold .shine-overlay {
            opacity: 0.85;
            mix-blend-mode: overlay;
            background: linear-gradient(135deg, 
                rgba(255, 255, 200, 0) 25%, 
                rgba(255, 255, 255, 1) 50%, 
                rgba(255, 255, 200, 0) 75%);
            background-size: 200% 200%;
            animation: gradientBG 2.5s linear infinite;
        }
    </style>
</head>
<body>

    <!-- PANNEAU DE CONFIGURATION -->
    <div class="controls">
        <div class="control-group">
            <label for="input-name">Nom de la carte</label>
            <input type="text" id="input-name" value="Doge">
        </div>

        <div class="control-group">
            <label for="input-image">Importer une image locale</label>
            <input type="file" id="input-image" accept="image/*">
        </div>

        <!-- LE NOUVEAU CHAMP POUR LE LIEN WEB -->
        <div class="control-group">
            <label for="input-url">Ou lien URL de l'image</label>
            <input type="url" id="input-url" placeholder="https://exemple.com/image.png">
        </div>

        <div class="control-group">
            <label for="input-scale">Zoom (Molette ou curseur)</label>
            <input type="range" id="input-scale" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label for="select-rarity">Rareté</label>
            <select id="select-rarity">
                <option value="common">Common</option>
                <option value="rare">Rare</option>
                <option value="epic" selected>Epic</option>
                <option value="legendary">Legendary</option>
                <option value="mythic">Mythic</option>
                <option value="og">OG</option>
                <option value="relic">Relic</option>
            </select>
        </div>

        <div class="control-group">
            <label for="select-shine">Effet de Brillance</label>
            <select id="select-shine">
                <option value="none">None</option>
                <option value="holo">Holographic</option>
                <option value="foil">Foil</option>
                <option value="gold">Gold</option>
            </select>
        </div>

        <button class="btn-download" id="btn-download">Télécharger la carte</button>
    </div>

    <!-- RENDER DE LA CARTE -->
    <div class="card-container">
        <div class="card epic" id="card-element">
            <div class="shine-overlay"></div>
            
            <div class="card-header">
                <div class="badge" id="card-rarity-badge">Epic</div>
                <div class="card-name" id="card-title">Doge</div>
                <div class="badge" id="card-shine-badge">Holo</div>
            </div>

            <div class="art-window" id="art-window">
                <img id="card-art" class="art-image" src="https://images.uncyclomedia.co/uncyclopedia/en/thumb/b/b3/Doge_original_image.png/320px-Doge_original_image.png" alt="Art">
            </div>
        </div>
    </div>

    <script>
        const inputName = document.getElementById('input-name');
        const inputImage = document.getElementById('input-image');
        const inputUrl = document.getElementById('input-url'); // Input URL
        const inputScale = document.getElementById('input-scale');
        const selectRarity = document.getElementById('select-rarity');
        const selectShine = document.getElementById('select-shine');
        const btnDownload = document.getElementById('btn-download');

        const cardElement = document.getElementById('card-element');
        const cardTitle = document.getElementById('card-title');
        const cardRarityBadge = document.getElementById('card-rarity-badge');
        const cardShineBadge = document.getElementById('card-shine-badge');
        const cardArt = document.getElementById('card-art');
        const artWindow = document.getElementById('art-window');

        let scale = 1;
        let posX = 0;
        let posY = 0;
        let isDragging = false;
        let startX, startY;

        function updateImageTransform() {
            cardArt.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetImageTransform() {
            posX = 0; posY = 0; scale = 1;
            inputScale.value = 1;
            updateImageTransform();
        }

        inputName.addEventListener('input', (e) => {
            cardTitle.textContent = e.target.value || "Sans nom";
        });

        // 1. Importation via Fichier Local
        inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cardArt.src = event.target.result;
                    inputUrl.value = ""; // Vide le champ URL
                    resetImageTransform();
                }
                reader.readAsDataURL(file);
            }
        });

        // 2. Importation via Lien URL Web
        inputUrl.addEventListener('input', (e) => {
            const url = e.target.value.trim();
            if (url) {
                cardArt.src = url;
                inputImage.value = ""; // Vide le sélecteur de fichier
                resetImageTransform();
            }
        });

        inputScale.addEventListener('input', (e) => {
            scale = e.target.value;
            updateImageTransform();
        });

        selectRarity.addEventListener('change', (e) => {
            const value = e.target.value;
            cardElement.className = `card ${value}`;
            if (selectShine.value !== 'none') cardElement.classList.add(selectShine.value);
            cardRarityBadge.textContent = value;
        });

        selectShine.addEventListener('change', (e) => {
            const value = e.target.value;
            cardElement.classList.remove('none', 'holo', 'foil', 'gold');
            
            if (value === 'none') {
                cardShineBadge.style.display = 'none';
            } else {
                cardElement.classList.add(value);
                cardShineBadge.style.display = 'block';
                if(value === 'holo') cardShineBadge.textContent = "Holo";
                if(value === 'foil') cardShineBadge.textContent = "Foil";
                if(value === 'gold') {
                    cardShineBadge.textContent = "Gold";
                    cardShineBadge.style.background = "#ffd700";
                    cardShineBadge.style.color = "#000";
                } else {
                    cardShineBadge.style.background = "rgba(255,255,255,0.2)";
                    cardShineBadge.style.color = "#fff";
                }
            }
        });

        /* --- GESTION DU DRAG & DROP DE L'IMAGE --- */
        artWindow.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateImageTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        artWindow.addEventListener('wheel', (e) => {
            e.preventDefault();
            let zoomFactor = e.deltaY < 0 ? 0.1 : -0.1;
            scale = Math.min(Math.max(1, parseFloat(scale) + zoomFactor), 5);
            inputScale.value = scale;
            updateImageTransform();
        });

        /* --- SCRIPT DE TÉLÉCHARGEMENT --- */
        btnDownload.addEventListener('click', () => {
            const options = {
                useCORS: true,       // Essentiel pour que html2canvas accepte de télécharger les images chargées via URL externe !
                allowTaint: false,
                backgroundColor: null, 
                scale: 2             
            };

            html2canvas(cardElement, options).then(canvas => {
                const link = document.createElement('a');
                const cardName = inputName.value.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `carte_${cardName || 'sans_nom'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("Erreur de capture : ", err);
                alert("Si l'image ne télécharge pas, le site hébergeant l'image bloque peut-être les partages externes (CORS). Essaie de l'enregistrer et de l'importer localement !");
            });
        });
    </script>
</body>
</html>
