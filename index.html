<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Cartes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e24;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 40px;
            padding: 20px;
        }

        /* --- PANNEAU DE CONTRÔLE --- */
        .controls {
            background: #2a2a32;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 0.9rem; color: #ccc; font-weight: bold; }
        input, select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1e1e24;
            color: white;
        }

        /* --- ZONE DE LA CARTE --- */
        .card-container {
            perspective: 1000px;
        }
        
        .card {
            width: 350px;
            height: 490px;
            border-radius: 18px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            border: 6px solid #ffd700;
        }

        /* --- STYLES PAR RARETÉ (TEMPLATES) --- */
        .card.common { background: linear-gradient(135deg, #a0a0a0, #707070); border-color: #555; }
        .card.rare { background: linear-gradient(135deg, #4a90e2, #2c5282); border-color: #4a90e2; }
        .card.epic { background: linear-gradient(135deg, #a0522d, #800080); border-color: #ba55d3; }
        .card.legendary { background: linear-gradient(135deg, #ff8c00, #ffd700); border-color: #ffd700; }
        .card.mythic { background: linear-gradient(135deg, #ff4500, #8b0000); border-color: #ff4500; }
        .card.og { background: linear-gradient(135deg, #8b5a2b, #cd853f); border-color: #8b5a2b; }
        .card.relic { background: linear-gradient(135deg, #00ffff, #008b8b); border-color: #00ffff; }

        /* --- EFFETS DE SHINE --- */
        .shine-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: all 0.3s;
        }
        
        /* Holographic : Reflet linéaire diagonal */
        .card.holo .shine-overlay {
            opacity: 0.4;
            background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.8) 50%, transparent 70%);
        }
        /* First Gen : Effet pailleté/étoilé basique (simulé ici par un dégradé radial multi-points) */
        .card.first-gen .shine-overlay {
            opacity: 0.5;
            background: radial-gradient(circle, #fff 10%, transparent 11%), radial-gradient(circle, #fff 10%, transparent 11%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        /* Crystal : Look prismatique géométrique */
        .card.crystal .shine-overlay {
            opacity: 0.6;
            background: linear-gradient(45deg, rgba(255,0,0,0.2), rgba(0,0,255,0.2)), repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
        }
        /* Foil : Brillance intégrale métallisée */
        .card.foil .shine-overlay {
            opacity: 0.3;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
        }

        /* --- ÉLÉMENTS INTERNES DE LA CARTE --- */
        .card-name {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 6px;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            z-index: 2;
        }

        .art-window {
            width: 100%;
            height: 220px;
            background: #111;
            margin-top: 15px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center;
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body>

    <!-- PANNEAU DE CONFIGURATION -->
    <div class="controls">
        <div class="control-group">
            <label for="input-name">Nom de la carte</label>
            <input type="text" id="input-name" value="Mon Monstre">
        </div>

        <div class="control-group">
            <label for="input-image">Importer une image</label>
            <input type="file" id="input-image" accept="image/*">
        </div>

        <div class="control-group">
            <label for="input-scale">Zoom de l'image</label>
            <input type="range" id="input-scale" min="0.5" max="3" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label for="select-rarity">Rareté (Template)</label>
            <select id="select-rarity">
                <option value="common">Common</option>
                <option value="rare">Rare</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
                <option value="mythic">Mythic</option>
                <option value="og">OG</option>
                <option value="relic">Relic</option>
            </select>
        </div>

        <div class="control-group">
            <label for="select-shine">Effet de Brillance (Shine)</label>
            <select id="select-shine">
                <option value="none">None</option>
                <option value="holo">Holographic</option>
                <option value="first-gen">First generation</option>
                <option value="crystal">Crystal</option>
                <option value="foil">Foil</option>
            </select>
        </div>
    </div>

    <!-- RENDER DE LA CARTE -->
    <div class="card-container">
        <div class="card common" id="card-element">
            <div class="shine-overlay"></div>
            <div class="card-name" id="card-title">Mon Monstre</div>
            <div class="art-window">
                <img id="card-art" class="art-image" src="https://via.placeholder.com/300x220/222/fff?text=Pas+d'image" alt="Art">
            </div>
        </div>
    </div>

    <script>
        // Sélection des éléments HTML de contrôle
        const inputName = document.getElementById('input-name');
        const inputImage = document.getElementById('input-image');
        const inputScale = document.getElementById('input-scale');
        const selectRarity = document.getElementById('select-rarity');
        const selectShine = document.getElementById('select-shine');

        // Sélection des éléments de la carte
        const cardElement = document.getElementById('card-element');
        const cardTitle = document.getElementById('card-title');
        const cardArt = document.getElementById('card-art');

        // Variables d'état pour l'image
        let currentScale = 1;

        // Synchronisation du nom
        inputName.addEventListener('input', (e) => {
            cardTitle.textContent = e.target.value || "Sans nom";
        });

        // Import de l'image locale
        inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cardArt.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Gestion du zoom de l'image
        inputScale.addEventListener('input', (e) => {
            currentScale = e.target.value;
            cardArt.style.transform = `scale(${currentScale})`;
        });

        // Gestion des changements de rareté (Classes CSS)
        selectRarity.addEventListener('change', (e) => {
            // On retire les anciennes classes de rareté
            cardElement.classList.remove('common', 'rare', 'epic', 'legendary', 'mythic', 'og', 'relic');
            // On ajoute la nouvelle
            cardElement.classList.add(e.target.value);
        });

        // Gestion des changements de brillance (Classes CSS)
        selectShine.addEventListener('change', (e) => {
            cardElement.classList.remove('none', 'holo', 'first-gen', 'crystal', 'foil');
            if (e.target.value !== 'none') {
                cardElement.classList.add(e.target.value);
            }
        });
    </script>
</body>
</html>
