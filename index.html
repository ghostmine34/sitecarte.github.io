<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Cartes Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121214;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 50px;
            padding: 20px;
            margin: 0;
        }

        /* --- PANNEAU DE CONTRÔLE --- */
        .controls {
            background: #1a1a1e;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 320px;
            border: 1px solid #2d2d35;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label { font-size: 0.85rem; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3a3a44;
            background: #26262b;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        input[type="range"] { padding: 0; }
        input:focus, select:focus { border-color: #4a90e2; }

        /* --- STRUCTURE OFFICIELLE DE LA CARTE --- */
        .card-container {
            perspective: 1000px;
        }
        
        .card {
            width: 360px;
            height: 510px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 14px;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid #ffd700;
            background-size: cover;
            background-position: center;
        }

        /* --- BANNIÈRE DU HAUT (RARETÉ + NOM) --- */
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-rarity-badge {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .card-name {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        /* --- ZONE DE L'IMAGE (PLUS GRANDE VERS LE BAS) --- */
        .art-window {
            width: 100%;
            height: 380px; /* Augmenté pour descendre plus bas sur la carte */
            margin-top: 10px;
            border: 3px solid rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            background: #151518;
        }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit l'espace sans étirer bizarrement (conserve le ratio) */
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center;
        }

        /* --- DESIGN & STYLES DES RARETÉS --- */
        .card.common { 
            background: linear-gradient(135deg, #5a6268, #343a40); border-color: #6c757d; 
        }
        .card.common .card-rarity-badge { background: #6c757d; }

        .card.rare { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); border-color: #007bff; 
        }
        .card.rare .card-rarity-badge { background: #007bff; }

        .card.epic { 
            background: linear-gradient(135deg, #4b0082, #800080, #240046); border-color: #bd93f9; 
        }
        .card.epic .card-rarity-badge { background: #9b5de5; }

        .card.legendary { 
            background: linear-gradient(135deg, #ff6b6b, #ff8e53, #e65c00); border-color: #ff9f43; 
        }
        .card.legendary .card-rarity-badge { background: #ff9f43; color: #000; font-weight: bold; }

        .card.mythic { 
            background: linear-gradient(135deg, #ffe259, #ffa751); border-color: #ffda79; 
        }
        .card.mythic .card-rarity-badge { background: #ffcc00; color: #000; }

        .card.og { 
            background: radial-gradient(circle at center, #ff0000 0%, #7a0000 60%, #2b0000 100%); border-color: #ff3333; 
        }
        .card.og .card-rarity-badge { background: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.6); }

        .card.relic { 
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00bfff, #00ff7f, #ff007f); background-size: 200% 200%; animation: gradientBG 8s ease infinite; border-color: #f1f2f6; 
        }
        .card.relic .card-rarity-badge { background: linear-gradient(to right, #ff007f, #00bfff); }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- EFFETS SHINE AJUSTÉS --- */
        .shine-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .card.holo .shine-overlay {
            opacity: 0.35;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.7) 50%, transparent 80%);
        }
        .card.first-gen .shine-overlay {
            opacity: 0.4;
            background: radial-gradient(circle, #fff 8%, transparent 9%), radial-gradient(circle, #fff 8%, transparent 9%);
            background-size: 25px 25px;
            background-position: 0 0, 12.5px 12.5px;
        }
        .card.crystal .shine-overlay {
            opacity: 0.5;
            background: linear-gradient(45deg, rgba(255,255,255,0.15), rgba(0,0,0,0.15)), repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(255,255,255,0.15) 15px, rgba(255,255,255,0.15) 30px);
        }
        .card.foil .shine-overlay {
            opacity: 0.25;
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
        }
    </style>
</head>
<body>

    <!-- PANNEAU DE CONFIGURATION -->
    <div class="controls">
        <div class="control-group">
            <label for="input-name">Nom de la carte</label>
            <input type="text" id="input-name" value="Doge">
        </div>

        <div class="control-group">
            <label for="input-image">Importer une image</label>
            <input type="file" id="input-image" accept="image/*">
        </div>

        <div class="control-group">
            <label for="input-scale">Zoom (Proportions gardées)</label>
            <input type="range" id="input-scale" min="1" max="4" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label for="select-rarity">Rareté</label>
            <select id="select-rarity">
                <option value="common">Common</option>
                <option value="rare">Rare</option>
                <option value="epic" selected>Epic</option>
                <option value="legendary">Legendary</option>
                <option value="mythic">Mythic</option>
                <option value="og">OG</option>
                <option value="relic">Relic</option>
            </select>
        </div>

        <div class="control-group">
            <label for="select-shine">Effet de Brillance</label>
            <select id="select-shine">
                <option value="none">None</option>
                <option value="holo">Holographic</option>
                <option value="first-gen">First generation</option>
                <option value="crystal">Crystal</option>
                <option value="foil">Foil</option>
            </select>
        </div>
    </div>

    <!-- RENDER DE LA CARTE -->
    <div class="card-container">
        <!-- Initialisé en épic par défaut pour voir la couleur mauve -->
        <div class="card epic" id="card-element">
            <div class="shine-overlay"></div>
            
            <div class="card-header">
                <div class="card-rarity-badge" id="card-badge">Epic</div>
                <div class="card-name" id="card-title">Doge</div>
            </div>

            <div class="art-window">
                <img id="card-art" class="art-image" src="https://images.uncyclomedia.co/uncyclopedia/en/thumb/b/b3/Doge_original_image.png/320px-Doge_original_image.png" alt="Art">
            </div>
        </div>
    </div>

    <script>
        const inputName = document.getElementById('input-name');
        const inputImage = document.getElementById('input-image');
        const inputScale = document.getElementById('input-scale');
        const selectRarity = document.getElementById('select-rarity');
        const selectShine = document.getElementById('select-shine');

        const cardElement = document.getElementById('card-element');
        const cardTitle = document.getElementById('card-title');
        const cardBadge = document.getElementById('card-badge');
        const cardArt = document.getElementById('card-art');

        // Changement de nom
        inputName.addEventListener('input', (e) => {
            cardTitle.textContent = e.target.value || "Sans nom";
        });

        // Importation d'image
        inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cardArt.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Zoom proportionnel
        inputScale.addEventListener('input', (e) => {
            cardArt.style.transform = `scale(${e.target.value})`;
        });

        // Rareté + Badge dynamique
        selectRarity.addEventListener('change', (e) => {
            const value = e.target.value;
            cardElement.className = `card ${value}`;
            
            // Remet l'effet shine s'il y en avait un d'actif
            if (selectShine.value !== 'none') {
                cardElement.classList.add(selectShine.value);
            }
            
            cardBadge.textContent = value;
        });

        // Brillance
        selectShine.addEventListener('change', (e) => {
            cardElement.classList.remove('none', 'holo', 'first-gen', 'crystal', 'foil');
            if (e.target.value !== 'none') {
                cardElement.classList.add(e.target.value);
            }
        });
    </script>
</body>
</html>
